name: Build & Release

# Runs automatically when you push a version tag, e.g: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

# Required for softprops/action-gh-release to create and upload releases
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # -------------------------------------------------------------------------
  # Windows
  # -------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Rebuild the bootloader from source to avoid AV false positives.
      # The default PyInstaller bootloader has a known binary signature that
      # heuristic scanners (e.g. Wacatac.B!ml) flag. Building it fresh breaks
      # that signature match. MSVC is pre-installed on windows-latest.
      - name: Rebuild PyInstaller bootloader
        run: |
          pip install pyinstaller
          git clone --depth 1 https://github.com/pyinstaller/pyinstaller.git _pyinstaller
          cd _pyinstaller/bootloader
          python ./waf all
          cd ../..
          pip install ./_pyinstaller

      - name: Build executable
        run: >
          pyinstaller
          --noconsole
          --onefile
          --collect-all customtkinter
          --hidden-import psutil
          --icon assets/favicon.ico
          --add-data "assets/favicon.ico;."
          --name BetterfoxUpdater
          app.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BetterfoxUpdater.exe
          generate_release_notes: true

  # -------------------------------------------------------------------------
  # macOS
  # -------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Same bootloader rebuild as Windows — macOS was also flagged.
      # Xcode Command Line Tools (clang) are pre-installed on macos-latest.
      - name: Rebuild PyInstaller bootloader
        run: |
          pip install pyinstaller
          git clone --depth 1 https://github.com/pyinstaller/pyinstaller.git _pyinstaller
          cd _pyinstaller/bootloader
          python ./waf all
          cd ../..
          pip install ./_pyinstaller

      # Convert the 1024px PNG to .icns using sips + iconutil (built into macOS)
      - name: Convert PNG to icns
        run: |
          mkdir AppIcon.iconset
          sips -z 16   16   assets/AppIcon1024.png --out AppIcon.iconset/icon_16x16.png
          sips -z 32   32   assets/AppIcon1024.png --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32   32   assets/AppIcon1024.png --out AppIcon.iconset/icon_32x32.png
          sips -z 64   64   assets/AppIcon1024.png --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128  128  assets/AppIcon1024.png --out AppIcon.iconset/icon_128x128.png
          sips -z 256  256  assets/AppIcon1024.png --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256  256  assets/AppIcon1024.png --out AppIcon.iconset/icon_256x256.png
          sips -z 512  512  assets/AppIcon1024.png --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512  512  assets/AppIcon1024.png --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/AppIcon1024.png --out AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset --output assets/AppIcon.icns

      - name: Build executable
        run: >
          pyinstaller
          --noconsole
          --onefile
          --collect-all customtkinter
          --hidden-import psutil
          --icon assets/AppIcon.icns
          --add-data "assets/AppIcon1024.png:."
          --name BetterfoxUpdater
          app.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BetterfoxUpdater
          generate_release_notes: true

  # -------------------------------------------------------------------------
  # Linux
  # -------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # tkinter is not bundled with Python on Ubuntu — must be installed separately
      - name: Install tkinter
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: >
          pyinstaller
          --noconsole
          --onefile
          --collect-all customtkinter
          --hidden-import psutil
          --icon assets/AppIcon1024.png
          --add-data "assets/AppIcon1024.png:."
          --name BetterfoxUpdater-Linux
          app.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BetterfoxUpdater-Linux
          generate_release_notes: true